# Standalone project tmux config
# Usage: tmux new-session -f ./tmux.conf -s myproject

# --- General ---
set -g mouse on
set -g default-terminal "screen-256color"

# --- Dracula-inspired theme ---
# Pane borders
set -g pane-border-style fg='#6272a4'
set -g pane-active-border-style fg='#ff79c6'

# Messages
set -g message-style bg='#44475a',fg='#8be9fd'

# Status bar
set -g status on
set -g status-interval 5
set -g status-style bg='#44475a',fg='#bd93f9'
set -g status-left-length 250
set -g status-right-length 250
set -g status-left " #S | "
set -g status-right '#(cat /proc/loadavg | awk "{print \"1m:\"\$1\" 5m:\"\$2\" 15m:\"\$3}") | #(free -h | awk "/Mem:/ {print \"MEM:\" \$3}") | %H:%M '

# --- Yank / clipboard ---
# If tmux-yank is installed locally, load it; otherwise skip silently
set -g @yank_selection_mouse 'clipboard'
if-shell "[ -f #{d:config_files}/tmux-yank/yank.tmux ]" \
    "run-shell #{d:config_files}/tmux-yank/yank.tmux"
