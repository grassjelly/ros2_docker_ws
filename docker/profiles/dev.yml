name: dev
root: <%= ENV["TMUXINATOR_CONFIG"] %>
tmux_options: -f <%= ENV["TMUXINATOR_CONFIG"] %>/tmux.conf
pre_window:
  - export HOST_UID=$(id -u)
  - export HOST_GID=$(id -g)

on_project_start:
  - docker compose up -d kasmvnc
  - HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose up -d dev

on_project_stop:
  - docker compose down

windows:
  - main:
      panes:
        - docker compose exec dev bash
        - docker compose exec dev bash
        - docker compose exec dev bash
        - docker compose exec dev bash
        - docker compose exec dev bash
        - docker compose exec dev bash
        - echo "Add more panes as needed for development tasks in docker/profiles/dev.yml"
        - echo "To exit, Ctrl +B then D. Run 'tmuxinator stop dev' to stop the containers."
